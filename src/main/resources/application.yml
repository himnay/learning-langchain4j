spring:
  application:
    name: Spring AI Demo
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
      file-size-threshold: 2KB
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
    stabilityai:
      api-key: ${STABILITYAI_API_KEY}
      image:
        options:
          model: stable-diffusion-xl-1024-v1-0
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
    vectorstore:
      redis:
        initialize-schema: true
  datasource:
    url: jdbc:postgresql://localhost:5432/spring_ai
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    baseline-description: existing schema

#logging:
#    level:
#        root: DEBUG
app:
  weather:
    api-key: ${WEATHER_API_KEY}
  documents:
    travel-policy:
      file:
        path: documents/AtlasCorp-TravelPolicy.pdf
    events:
      file:
        path: documents/AtlasCorp_Events_Holidays.pdf